<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日惊喜 🎂</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow-x: hidden;
  background: url("your-bg.jpg") no-repeat center center/cover;
}

/* 页面 */
.page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hidden { display: none; }

/* 按钮 */
button {
  padding: 12px;
  margin: 8px;
  border: none;
  background: #ff66a3;
  color: white;
  border-radius: 20px;
  width: 80%;
  max-width: 300px;
  transition: 0.2s;
}

/* 正确/错误 */
.correct {
  background: #4cd964 !important;
}

.wrong {
  background: #ff3b30 !important;
}

/* 过渡页 */
#transition {
  background: rgba(0,0,0,0.85);
  color: white;
  font-size: 28px;
}

/* 卡片 */
.section {
  margin: 50px auto;
  width: 90%;
  max-width: 400px;
  background: rgba(255,255,255,0.92);
  border-radius: 20px;
  opacity: 0;
  transform: translateY(50px);
  transition: 0.6s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

.header {
  background: #ff99cc;
  padding: 12px;
  border-radius: 20px 20px 0 0;
}

.content {
  padding: 15px;
}

img, video {
  width: 100%;
  border-radius: 20px;
}

/* 提示 */
#scrollHint {
  margin-top: 20px;
  font-size: 16px;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

/* 💖 爱心 */
.floating-heart {
  position: fixed;
  font-size: 20px;
  pointer-events: none;
  animation: floatUp 1s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-120px); opacity: 0; }
}

/* 🎁 彩蛋 */
#surprise {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  color: white;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<!-- 🎵 音乐 -->
<audio id="music" loop>
  <source src="your-music.mp3">
</audio>

<!-- 🧠 答题 -->
<div id="quiz" class="page">
  <h2 id="question"></h2>
  <div id="options"></div>
</div>

<!-- 🎆 过渡 -->
<div id="transition" class="page hidden">
  <div id="transitionText"></div>
</div>

<!-- 🎂 主页面 -->
<div id="birthday" class="hidden">

  <div class="page">
    <h1>🎂 生日快乐 🎉</h1>
    <p id="typing"></p>
    <div id="scrollHint">探索更多 ⬇️</div>
  </div>

  <div class="section">
    <div class="header">🎉 祝福</div>
    <div class="content">愿你永远开心快乐，被爱包围 ❤️</div>
  </div>

  <div class="section">
    <div class="header">🖼️ 图片</div>
    <div class="content">
      <img src="https://via.placeholder.com/300">
    </div>
  </div>

  <div class="section">
    <div class="header">🎥 视频</div>
    <div class="content">
      <video controls>
        <source src="your-video.mp4">
      </video>
    </div>
  </div>

</div>

<!-- 🎁 彩蛋 -->
<div id="surprise">
  🎁 其实我最想说的是…<br><br>
  ❤️ 我真的很在乎你 ❤️<br><br>
  <button onclick="closeSurprise()">关闭</button>
</div>

<script>
const questions = [
  { q:"她最喜欢的颜色？", options:["红","蓝","粉","黑"], answer:2 },
  { q:"她喜欢吃什么？", options:["辣","甜","苦","酸"], answer:1 },
  { q:"她生日是几月？", options:["1","5","8","12"], answer:1 },
  { q:"她最喜欢的动物？", options:["猫","狗","兔","熊"], answer:0 },
  { q:"她喜欢旅行吗？", options:["是","否"], answer:0 },
  { q:"她喜欢音乐吗？", options:["是","否"], answer:0 },
  { q:"她喜欢咖啡吗？", options:["是","否"], answer:0 },
  { q:"她喜欢海边吗？", options:["是","否"], answer:0 },
  { q:"她开心吗？", options:["是","否"], answer:0 },
  { q:"她是特别的人吗？", options:["当然是","不是"], answer:0 }
];

let current = 0;

/* 🧠 题目加载（打字） */
function loadQuestion(){
  const q = questions[current];

  typeQuestion(q.q);

  options.innerHTML = "";

  q.options.forEach((opt,i)=>{
    let btn=document.createElement("button");
    btn.innerText=opt;
    btn.onclick=()=>checkAnswer(btn,i);
    options.appendChild(btn);
  });
}

function typeQuestion(text){
  question.innerHTML="";
  let i=0;
  let t=setInterval(()=>{
    question.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },70);
}

/* ✅ 答题逻辑 */
function checkAnswer(btn,i){
  const correct = questions[current].answer;

  if(i===correct){
    btn.classList.add("correct");

    setTimeout(()=>{
      current++;
      if(current<questions.length){
        loadQuestion();
      }else{
        showTransition();
      }
    },400);
  }else{
    btn.classList.add("wrong");
    setTimeout(()=>btn.classList.remove("wrong"),400);
  }
}

/* 🎆 过渡打字 */
function showTransition(){
  quiz.classList.add("hidden");
  transition.classList.remove("hidden");
  music.play();

  typeText("🎂 生日快乐 🎉",()=>{
    transition.classList.add("hidden");
    birthday.classList.remove("hidden");
    startTyping();
    reveal();
    startSurpriseTimer();
  });
}

function typeText(text,callback){
  let el=document.getElementById("transitionText");
  let i=0;
  el.innerHTML="";
  let t=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length){
      clearInterval(t);
      setTimeout(callback,800);
    }
  },90);
}

/* ✍️ 主打字 */
let text="今天是属于你的特别一天，希望你永远开心快乐 ❤️";
let i=0;

function startTyping(){
  let t=setInterval(()=>{
    typing.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },80);
}

/* 📜 滚动显示 */
function reveal(){
  let secs=document.querySelectorAll(".section");
  function show(){
    let h=window.innerHeight*0.85;
    secs.forEach(s=>{
      if(s.getBoundingClientRect().top<h){
        s.classList.add("show");
      }
    });
  }
  window.addEventListener("scroll",show);
  show();
}

/* 💖 爱心点击效果 */
document.addEventListener("click",e=>{
  for(let i=0;i<12;i++){
    let heart=document.createElement("div");
    heart.className="floating-heart";
    heart.innerHTML="💖";

    heart.style.left=e.clientX+"px";
    heart.style.top=e.clientY+"px";

    document.body.appendChild(heart);

    let angle=Math.random()*2*Math.PI;
    let dist=80;

    heart.animate([
      {transform:"translate(0,0)"},
      {transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`}
    ],{duration:800});

    setTimeout(()=>heart.remove(),800);
  }
});

/* 🎁 彩蛋 */
function startSurpriseTimer(){
  setTimeout(()=>{
    surprise.style.display="flex";
  },8000);
}

function closeSurprise(){
  surprise.style.display="none";
}

loadQuestion();
</script>

</body>
</html>
