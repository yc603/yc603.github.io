<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日惊喜 🎂</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow-x: hidden;
  background: url("your-bg.jpg") no-repeat center center/cover;
  color: white;
}

/* ===== 通用页面 ===== */
.page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.hidden { display: none; }

/* ===== 按钮 ===== */
button {
  padding: 12px;
  margin: 8px;
  border: none;
  background: #ff4fa3;
  color: white;
  border-radius: 18px;
  width: 80%;
  max-width: 320px;
}

/* 正误 */
.correct { background: #2ecc71 !important; }
.wrong { background: #e74c3c !important; }

/* ===== 过渡页 ===== */
#transition {
  background: black;
  color: white;
  font-size: 28px;
}

/* ===== 最后一页（滚动结构） ===== */
.final-wrapper {
  height: 100vh;
  overflow-y: auto;
  scroll-snap-type: y mandatory;
}

/* 每一屏 */
.section {
  height: 100vh;
  scroll-snap-align: start;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;

  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s;
  background: rgba(0,0,0,0.55);
  padding: 40px;
  text-align: center;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

.title {
  font-size: 40px;
  font-weight: bold;
}

.sub {
  margin-top: 10px;
  opacity: 0.8;
}

img, video {
  width: 80%;
  max-width: 400px;
  border-radius: 15px;
}

/* 💖 单爱心 */
.heart {
  position: fixed;
  font-size: 22px;
  pointer-events: none;
  animation: float 1s ease-out forwards;
}

@keyframes float {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
}
</style>
</head>

<body>

<!-- 🎵 音乐 -->
<audio id="music" loop>
  <source src="your-music.mp3">
</audio>

<!-- 🧠 答题 -->
<div id="quiz" class="page">
  <h2 id="question"></h2>
  <div id="options"></div>
</div>

<!-- 🎆 过渡 -->
<div id="transition" class="page hidden">
  <div id="transitionText"></div>
</div>

<!-- 🎂 最终页 -->
<div id="birthday" class="hidden">

  <div class="final-wrapper">

    <div class="section">
      <div class="title">生日快乐 🎂</div>
      <div class="sub" id="typing"></div>
    </div>

    <div class="section">
      <div class="title">祝福</div>
      <div class="sub">愿你永远闪闪发光 ✨</div>
    </div>

    <div class="section">
      <div class="title">回忆</div>
      <img src="https://via.placeholder.com/400">
    </div>

    <div class="section">
      <div class="title">视频</div>
      <video controls>
        <source src="your-video.mp4">
      </video>
    </div>

  </div>

</div>

<script>

/* ===== 修复：DOM安全引用 ===== */
const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");

/* ===== 题目 ===== */
const questions = [
  { q:"她最喜欢的颜色？", options:["红","蓝","粉","黑"], answer:2 },
  { q:"她喜欢吃什么？", options:["辣","甜","苦","酸"], answer:1 },
  { q:"她生日是几月？", options:["1","5","8","12"], answer:1 },
  { q:"她最喜欢的动物？", options:["猫","狗","兔","熊"], answer:0 },
  { q:"她喜欢旅行吗？", options:["是","否"], answer:0 },
  { q:"她喜欢音乐吗？", options:["是","否"], answer:0 },
  { q:"她喜欢咖啡吗？", options:["是","否"], answer:0 },
  { q:"她喜欢海边吗？", options:["是","否"], answer:0 },
  { q:"她开心吗？", options:["是","否"], answer:0 },
  { q:"她是特别的人吗？", options:["当然是","不是"], answer:0 }
];

let current = 0;

/* ===== 题目打字（慢） ===== */
function loadQuestion(){
  const q = questions[current];

  typeText(q.q, questionEl, 120); // 👈 放慢

  optionsEl.innerHTML = "";

  q.options.forEach((opt,i)=>{
    let btn=document.createElement("button");
    btn.innerText=opt;
    btn.onclick=()=>check(btn,i);
    optionsEl.appendChild(btn);
  });
}

function typeText(text, el, speed){
  el.innerHTML="";
  let i=0;
  let t=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },speed);
}

/* ===== 答题 ===== */
function check(btn,i){
  if(i===questions[current].answer){
    btn.classList.add("correct");

    setTimeout(()=>{
      current++;
      if(current<questions.length){
        loadQuestion();
      }else{
        showTransition();
      }
    },400);
  }else{
    btn.classList.add("wrong");
    setTimeout(()=>btn.classList.remove("wrong"),400);
  }
}

/* ===== 过渡 ===== */
function showTransition(){
  quiz.classList.add("hidden");
  transition.classList.remove("hidden");
  music.play();

  typeText("生日快乐 🎂", transitionText, 120);

  setTimeout(()=>{
    transition.classList.add("hidden");
    birthday.classList.remove("hidden");
    startTyping();
    revealSections();
  },2000);
}

/* ===== 最终打字 ===== */
function startTyping(){
  const el = document.getElementById("typing");
  let text = "愿你每天都比昨天更快乐一点 ❤️";
  let i=0;

  let t=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },90);
}

/* ===== 滚动出现 ===== */
function revealSections(){
  const secs = document.querySelectorAll(".section");

  function check(){
    secs.forEach(s=>{
      if(s.getBoundingClientRect().top < window.innerHeight*0.8){
        s.classList.add("show");
      }
    });
  }

  window.addEventListener("scroll",check);
  check();
}

/* ===== 💖 单爱心 ===== */
document.addEventListener("click",e=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=e.clientX+"px";
  h.style.top=e.clientY+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1000);
});

/* ===== 初始化 ===== */
loadQuestion();

</script>

</body>
</html>
