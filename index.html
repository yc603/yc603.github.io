<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日惊喜 🎂</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow-x: hidden;
  background: #000;
  color: white;
}

/* =========================
   🎬 开场动画
========================= */
#intro {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

.intro-text {
  font-size: 28px;
  opacity: 0;
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* =========================
   🧠 答题
========================= */
.page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  background: url("your-bg.jpg") no-repeat center center/cover;
}

.hidden { display: none; }

button {
  padding: 12px;
  margin: 8px;
  border: none;
  background: #ff4fa3;
  color: white;
  border-radius: 18px;
  width: 80%;
  max-width: 320px;
}

.correct { background: #2ecc71 !important; }
.wrong { background: #e74c3c !important; }

/* =========================
   🎬 过渡
========================= */
#transition {
  background: black;
  font-size: 28px;
}

/* =========================
   📱 Story模式（重点）
========================= */
.story-wrapper {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

/* 每一屏 */
.story {
  height: 100vh;
  scroll-snap-align: start;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 40px;
  text-align: center;

  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s;

  background: rgba(0,0,0,0.6);
}

.story.show {
  opacity: 1;
  transform: translateY(0);
}

.title {
  font-size: 40px;
  font-weight: bold;
}

.sub {
  margin-top: 10px;
  opacity: 0.8;
}

img, video {
  width: 85%;
  max-width: 400px;
  border-radius: 15px;
}

/* 💖 单爱心 */
.heart {
  position: fixed;
  font-size: 22px;
  pointer-events: none;
  animation: float 1s ease-out forwards;
}

@keyframes float {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
}
</style>
</head>

<body>

<!-- 🎬 开场动画 -->
<div id="intro">
  <div class="intro-text" id="introText">准备进入特别的一天...</div>
</div>

<!-- 🧠 答题 -->
<div id="quiz" class="page hidden">
  <h2 id="question"></h2>
  <div id="options"></div>
</div>

<!-- 🎬 过渡 -->
<div id="transition" class="page hidden">
  <div id="transitionText"></div>
</div>

<!-- 📱 Story模式最终页 -->
<div id="birthday" class="hidden">

  <div class="story-wrapper">

    <div class="story">
      <div class="title">生日快乐 🎂</div>
      <div class="sub" id="typing"></div>
    </div>

    <div class="story">
      <div class="title">祝福</div>
      <div class="sub">愿你永远闪闪发光 ✨</div>
    </div>

    <div class="story">
      <div class="title">回忆</div>
      <img src="https://via.placeholder.com/400">
    </div>

    <div class="story">
      <div class="title">视频</div>
      <video controls>
        <source src="your-video.mp4">
      </video>
    </div>

  </div>

</div>

<script>

/* =========================
   🎬 开场动画控制
========================= */
setTimeout(()=>{
  introText.innerText = "进入你的专属故事...";
},2000);

setTimeout(()=>{
  document.getElementById("intro").style.display="none";
  document.getElementById("quiz").classList.remove("hidden");
},4000);

/* =========================
   🧠 题目
========================= */
const questions = [
  { q:"她最喜欢的颜色？", options:["红","蓝","粉","黑"], answer:2 },
  { q:"她喜欢吃什么？", options:["辣","甜","苦","酸"], answer:1 },
  { q:"她生日是几月？", answer:1, options:["1","5","8","12"] },
  { q:"她最喜欢的动物？", answer:0, options:["猫","狗","兔","熊"] },
  { q:"她喜欢旅行吗？", answer:0, options:["是","否"] },
  { q:"她喜欢音乐吗？", answer:0, options:["是","否"] },
  { q:"她喜欢咖啡吗？", answer:0, options:["是","否"] },
  { q:"她开心吗？", answer:0, options:["是","否"] },
  { q:"她是特别的人吗？", answer:0, options:["当然是","不是"] },
  { q:"她会被感动吗？", answer:0, options:["会","不会"] }
];

let current = 0;

function loadQuestion(){
  const q = questions[current];

  type(q.q, question, 140);

  options.innerHTML = "";

  q.options.forEach((opt,i)=>{
    let btn=document.createElement("button");
    btn.innerText=opt;
    btn.onclick=()=>check(btn,i);
    options.appendChild(btn);
  });
}

function type(text, el, speed){
  el.innerHTML="";
  let i=0;
  let t=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },speed);
}

function check(btn,i){
  if(i===questions[current].answer){
    btn.classList.add("correct");

    setTimeout(()=>{
      current++;
      if(current<questions.length){
        loadQuestion();
      }else{
        showTransition();
      }
    },400);
  }else{
    btn.classList.add("wrong");
    setTimeout(()=>btn.classList.remove("wrong"),400);
  }
}

/* =========================
   🎬 过渡
========================= */
function showTransition(){
  quiz.classList.add("hidden");
  transition.classList.remove("hidden");

  type("生日快乐 🎂", transitionText, 120);

  setTimeout(()=>{
    transition.classList.add("hidden");
    birthday.classList.remove("hidden");
    startTyping();
    revealStories();
  },2000);
}

/* =========================
   ✍️ 打字
========================= */
function startTyping(){
  let text="愿你未来每一天都比今天更快乐 ❤️";
  let el=document.getElementById("typing");
  let i=0;

  let t=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },90);
}

/* =========================
   📱 Story滚动动画
========================= */
function revealStories(){
  const items=document.querySelectorAll(".story");

  function check(){
    items.forEach(s=>{
      if(s.getBoundingClientRect().top < window.innerHeight*0.8){
        s.classList.add("show");
      }
    });
  }

  window.addEventListener("scroll",check);
  check();
}

/* =========================
   💖 单爱心
========================= */
document.addEventListener("click",e=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=e.clientX+"px";
  h.style.top=e.clientY+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1000);
});

/* =========================
   初始化
========================= */
loadQuestion();

</script>

</body>
</html>
