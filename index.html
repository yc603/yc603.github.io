<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日惊喜 🎂</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow-x: hidden;
  background: linear-gradient(to bottom, #ffd6e0, #fff);
}

.page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hidden { display: none; }

button {
  padding: 12px;
  margin: 8px;
  border: none;
  background: #ff66a3;
  color: white;
  border-radius: 8px;
  width: 80%;
}

/* 🎆 过渡 */
#transition {
  background: black;
  color: white;
  font-size: 30px;
}

/* ✨ section */
.section {
  margin: 50px auto;
  width: 90%;
  max-width: 400px;
  background: white;
  border-radius: 12px;
  opacity: 0;
  transform: translateY(50px);
  transition: 0.6s;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

.header {
  background: #ff99cc;
  padding: 10px;
}

.content { padding: 10px; }

img, video {
  width: 100%;
  border-radius: 10px;
}

/* 💖 爱心 */
.heart {
  position: fixed;
  color: red;
  animation: float 1s linear forwards;
}

@keyframes float {
  to {
    transform: translateY(-50px);
    opacity: 0;
  }
}

/* 🎁 彩蛋 */
#surprise {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  color: white;
  display: none;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  flex-direction: column;
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="your-music.mp3">
</audio>

<!-- 答题 -->
<div id="quiz" class="page">
  <h2 id="question"></h2>
  <div id="options"></div>
</div>

<!-- 过渡 -->
<div id="transition" class="page hidden">
  🎂 生日快乐 🎉
</div>

<!-- 主页面 -->
<div id="birthday" class="hidden">

  <div class="page">
    <h1>🎂 生日快乐 🎉</h1>
    <p id="typing"></p>
  </div>

  <div class="section">
    <div class="header">🎉 祝福</div>
    <div class="content">愿你永远被爱包围 ❤️</div>
  </div>

  <div class="section">
    <div class="header">🖼️ 图片</div>
    <div class="content">
      <img src="https://via.placeholder.com/300">
    </div>
  </div>

  <div class="section">
    <div class="header">🎥 视频</div>
    <div class="content">
      <video controls>
        <source src="your-video.mp4">
      </video>
    </div>
  </div>

</div>

<!-- 🎁 彩蛋 -->
<div id="surprise">
  🎁 其实我最想说的是…<br><br>
  ❤️ 我真的很在乎你 ❤️
</div>

<script>
const questions = [
  { q: "她最喜欢的颜色？", options: ["红","蓝","粉","黑"], answer: 2 },
  { q: "她喜欢吃什么？", options: ["辣","甜","苦","酸"], answer: 1 },
  { q: "她生日是几月？", options: ["1","5","8","12"], answer: 1 },
  { q: "她最喜欢的动物？", options: ["猫","狗","兔","熊"], answer: 0 },
  { q: "她喜欢旅行吗？", options: ["是","否"], answer: 0 },
  { q: "她喜欢音乐吗？", options: ["是","否"], answer: 0 },
  { q: "她喜欢咖啡吗？", options: ["是","否"], answer: 0 },
  { q: "她喜欢海边吗？", options: ["是","否"], answer: 0 },
  { q: "她开心吗？", options: ["是","否"], answer: 0 },
  { q: "她是特别的人吗？", options: ["当然是","不是"], answer: 0 }
];

let current = 0;

function loadQuestion() {
  const q = questions[current];
  question.innerText = q.q;
  options.innerHTML = "";

  q.options.forEach((opt,i)=>{
    let btn=document.createElement("button");
    btn.innerText=opt;
    btn.onclick=()=>checkAnswer(i);
    options.appendChild(btn);
  });
}

function checkAnswer(i){
  if(i===questions[current].answer){
    current++;
    if(current<questions.length){
      loadQuestion();
    } else {
      showTransition();
    }
  } else {
    alert("答错啦 😜");
  }
}

function showTransition(){
  quiz.classList.add("hidden");
  transition.classList.remove("hidden");
  music.play();

  setTimeout(()=>{
    transition.classList.add("hidden");
    birthday.classList.remove("hidden");
    startTyping();
    reveal();
    startSurpriseTimer();
  },3000);
}

/* ✍️ 打字 */
let text="今天是你的特别一天 ❤️";
let i=0;
function startTyping(){
  let t=setInterval(()=>{
    typing.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },80);
}

/* 📜 滚动 */
function reveal(){
  let secs=document.querySelectorAll(".section");
  function show(){
    let h=window.innerHeight*0.85;
    secs.forEach(s=>{
      if(s.getBoundingClientRect().top<h){
        s.classList.add("show");
      }
    });
  }
  window.addEventListener("scroll",show);
  show();
}

/* 🎆 烟花 */
document.addEventListener("click",e=>{
  for(let i=0;i<20;i++){
    let spark=document.createElement("div");
    spark.style.position="fixed";
    spark.style.left=e.clientX+"px";
    spark.style.top=e.clientY+"px";
    spark.style.width="5px";
    spark.style.height="5px";
    spark.style.background=`hsl(${Math.random()*360},100%,50%)`;
    spark.style.borderRadius="50%";
    document.body.appendChild(spark);

    let angle=Math.random()*2*Math.PI;
    let dist=100;

    spark.animate([
      {transform:"translate(0,0)"},
      {transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`}
    ],{duration:800});

    setTimeout(()=>spark.remove(),800);
  }
});

/* 🎁 彩蛋 */
function startSurpriseTimer(){
  setTimeout(()=>{
    document.getElementById("surprise").style.display="flex";
  },8000);
}

loadQuestion();
</script>

</body>
</html>
