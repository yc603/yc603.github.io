<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日惊喜 🎂</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow-x: hidden;
  background: url("your-bg.jpg") no-repeat center center/cover;
  color: white;
}

/* 页面基础 */
.page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hidden { display: none; }

/* 按钮 */
button {
  padding: 12px;
  margin: 8px;
  border: none;
  background: #ff4fa3;
  color: white;
  border-radius: 18px;
  width: 80%;
  max-width: 320px;
}

/* 正确错误 */
.correct { background: #2ecc71 !important; }
.wrong { background: #e74c3c !important; }

/* 🎆 过渡页（打字） */
#transition {
  background: black;
  color: white;
  font-size: 30px;
}

/* =========================
   🌟 最终页面 VW 风格设计
========================= */

.final-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px;
  background: rgba(0,0,0,0.55);
}

/* 大标题 */
.hero-title {
  font-size: 40px;
  font-weight: bold;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

/* 副标题 */
.hero-sub {
  font-size: 16px;
  opacity: 0.8;
  margin-bottom: 40px;
}

/* 分区（类似 VW 卡片） */
.vw-block {
  border-left: 3px solid #ff4fa3;
  padding: 15px 20px;
  margin: 20px 0;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  border-radius: 10px;
}

/* 图片 */
img, video {
  width: 100%;
  border-radius: 12px;
}

/* ⬇️ 探索 */
.scroll-hint {
  margin-top: 40px;
  font-size: 14px;
  opacity: 0.7;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

/* 💖 单颗爱心 */
.heart {
  position: fixed;
  font-size: 22px;
  pointer-events: none;
  animation: float 1s ease-out forwards;
}

@keyframes float {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
}
</style>
</head>

<body>

<!-- 🎵 音乐 -->
<audio id="music" loop>
  <source src="your-music.mp3">
</audio>

<!-- 🧠 答题 -->
<div id="quiz" class="page">
  <h2 id="question"></h2>
  <div id="options"></div>
</div>

<!-- 🎆 过渡 -->
<div id="transition" class="page hidden">
  <div id="transitionText"></div>
</div>

<!-- 🎂 最终页面（VW风格） -->
<div id="birthday" class="hidden">

  <div class="final-page">

    <div class="hero-title">生日快乐 🎂</div>
    <div id="typing"></div>
    <div class="hero-sub">A special moment, just for you</div>

    <div class="vw-block">
      🎉 今天是属于你的特别一天<br>
      愿你永远自由、快乐、闪闪发光
    </div>

    <div class="vw-block">
      🖼️ 回忆片段
      <img src="https://via.placeholder.com/400">
    </div>

    <div class="vw-block">
      🎥 一段话想给你
      <video controls>
        <source src="your-video.mp4">
      </video>
    </div>

    <div class="scroll-hint">
      探索更多 ⬇
    </div>

  </div>

</div>

<script>

/* ===== 题目 ===== */
const questions = [
  { q:"她最喜欢的颜色？", options:["红","蓝","粉","黑"], answer:2 },
  { q:"她喜欢吃什么？", options:["辣","甜","苦","酸"], answer:1 },
  { q:"她生日是几月？", options:["1","5","8","12"], answer:1 },
  { q:"她最喜欢的动物？", options:["猫","狗","兔","熊"], answer:0 },
  { q:"她喜欢旅行吗？", options:["是","否"], answer:0 },
  { q:"她喜欢音乐吗？", options:["是","否"], answer:0 },
  { q:"她喜欢咖啡吗？", options:["是","否"], answer:0 },
  { q:"她喜欢海边吗？", options:["是","否"], answer:0 },
  { q:"她开心吗？", options:["是","否"], answer:0 },
  { q:"她是特别的人吗？", options:["当然是","不是"], answer:0 }
];

let current = 0;

/* ===== 打字题目（更慢） ===== */
function loadQuestion(){
  const q = questions[current];

  typeText(q.q, question);

  options.innerHTML = "";

  q.options.forEach((opt,i)=>{
    let btn=document.createElement("button");
    btn.innerText=opt;

    btn.onclick=()=>check(btn,i);

    options.appendChild(btn);
  });
}

/* 慢一点 */
function typeText(text, el){
  el.innerHTML="";
  let i=0;
  let t=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },120); // 👈 放慢
}

/* ===== 答题 ===== */
function check(btn,i){
  if(i===questions[current].answer){
    btn.classList.add("correct");

    setTimeout(()=>{
      current++;
      if(current<questions.length){
        loadQuestion();
      }else{
        showTransition();
      }
    },500);

  }else{
    btn.classList.add("wrong");
    setTimeout(()=>btn.classList.remove("wrong"),400);
  }
}

/* ===== 过渡 ===== */
function showTransition(){
  quiz.classList.add("hidden");
  transition.classList.remove("hidden");
  music.play();

  typeCenter("生日快乐 🎂",()=>{
    transition.classList.add("hidden");
    birthday.classList.remove("hidden");
    startFinalTyping();
  });
}

/* 中间打字 */
function typeCenter(text, cb){
  let el=document.getElementById("transitionText");
  el.innerHTML="";
  let i=0;

  let t=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length){
      clearInterval(t);
      setTimeout(cb,800);
    }
  },120);
}

/* ===== 最终打字 ===== */
function startFinalTyping(){
  let text="愿你在未来的每一天，都比今天更快乐一点 ❤️";
  let el=document.getElementById("typing");
  let i=0;

  let t=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },90);
}

/* ===== 💖 单个爱心 ===== */
document.addEventListener("click",e=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=e.clientX+"px";
  h.style.top=e.clientY+"px";

  document.body.appendChild(h);

  setTimeout(()=>h.remove(),1000);
});

loadQuestion();

</script>

</body>
</html>
