<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日电影 🎬</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* =========================
   🎬 电影开场
========================= */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

.intro-text {
  font-size: 20px;
  opacity: 0;
  animation: fadeIn 3s forwards;
  letter-spacing: 2px;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* =========================
   🧠 题目（电影对白）
========================= */
.page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  background: url("mmexport1737116990793.jpg") center/cover;
}

.hidden { display: none; }

#question {
  font-size: 22px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.8);
}

button {
  padding: 12px;
  margin: 8px;
  border: none;
  background: rgba(255,79,165,0.9);
  color: white;
  border-radius: 20px;
  width: 80%;
  max-width: 320px;
  transition: 0.3s;
}

button:active {
  transform: scale(0.96);
}

.correct { background: #2ecc71 !important; }
.wrong { background: #e74c3c !important; }

/* =========================
   🎬 电影转场
========================= */
#transition {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 34px;
  letter-spacing: 3px;
  animation: zoomIn 2s ease;
}

@keyframes zoomIn {
  from { transform: scale(1.3); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* =========================
   📱 电影式滚动故事
========================= */
.story-wrapper {
  height: 100vh;
  overflow-y: auto;
  scroll-snap-type: y mandatory;
  background: linear-gradient(to bottom, #000, #111);
}

.story {
  height: 100vh;
  scroll-snap-align: start;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 40px;
  text-align: center;

  opacity: 0;
  transform: scale(1.05);
  filter: blur(10px);
  transition: 1s ease;
}

.story.show {
  opacity: 1;
  transform: scale(1);
  filter: blur(0);
}

.title {
  font-size: 42px;
  font-weight: bold;
  letter-spacing: 2px;
}

.sub {
  margin-top: 10px;
  opacity: 0.8;
}

img, video {
  width: 85%;
  max-width: 420px;
  border-radius: 15px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* =========================
   💖 爱心（电影粒子）
========================= */
.heart {
  position: fixed;
  font-size: 20px;
  pointer-events: none;
  animation: float 1.2s ease-out forwards;
}

@keyframes float {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: translateY(-120px) scale(1.6); }
}
</style>
</head>

<body>

<!-- 🎬 电影开场 -->
<div id="intro">
  <div class="intro-text" id="introText">
    A story begins...
  </div>
</div>

<!-- 🧠 题目 -->
<div id="quiz" class="page hidden">
  <h2 id="question"></h2>
  <div id="options"></div>
</div>

<!-- 🎬 转场 -->
<div id="transition" class="hidden">
  生日快乐 🎬
</div>

<!-- 🎂 电影结局 -->
<div id="birthday" class="hidden">

  <div class="story-wrapper">

    <div class="story">
      <div class="title">生日快乐 🎂</div>
      <div class="sub" id="typing"></div>
    </div>

    <div class="story">
      <div class="title">祝福</div>
      <div class="sub">You are my favorite story ✨</div>
    </div>

    <div class="story">
      <div class="title">回忆</div>
      <img src="https://via.placeholder.com/400">
    </div>

    <div class="story">
      <div class="title">结尾</div>
      <video controls>
        <source src="your-video.mp4">
      </video>
    </div>

  </div>

</div>

<script>

/* =========================
   🎬 开场控制
========================= */
setTimeout(()=>{
  document.getElementById("introText").innerText = "This is not just a website...";
},2000);

setTimeout(()=>{
  document.getElementById("intro").style.display="none";
  document.getElementById("quiz").classList.remove("hidden");
},4000);

/* =========================
   🧠 题目
========================= */
const questions = [
  { q:"我们是怎么认识的？", options:["上班🐄","实习🐎","搭讪😏","打乒乓球🏓","上课📖"], answer:2 },
  { q:"我们认识的日期？", options:["5月12号","6月3号","4月17号","7月14号","不记得🤯"], answer:4 },
  { q:"我的mbti？", options:["enfj","intp","infj","enfp","entp"], answer:3 },
  { q:"我们在中国最常吃的食物是？", options:["螺狮粉","臭豆腐","姥姥下碗面","烧仙草","清汤粉"], answer:0 },
  { q:"回来马来西亚后我们吃的第一家餐厅是？", options:["太二酸菜鱼","中国兰州拉面","Uno Sushi","Mr Wu","Shin Zushi"], answer:2 },
  { q:"你陪我打游戏玩到凌晨的地方是？", options:["福州","龙岩","厦门","赣州","泉州"], answer:1 },
  { q:"我们一起去过哪里旅行？", options:["泉州","厦门","漳州","福州","赣州"], answer:4 },
  { q:"我的身高？", options:["163。1","163.2","163.3","163.4","163.5"], answer:3 },
  { q:"你放工后最想干嘛？", options:["直奔老巢","狠狠睡觉","刷剧","啥也不干","跟我一起玩"], answer:4 },
  { q:"臭豆腐有几种口味？", options:["10","13","15","9","7"], answer:2 }
];

let current = 0;

function loadQuestion(){
  const q = questions[current];

  type(q.q, question, 160);

  options.innerHTML = "";

  q.options.forEach((opt,i)=>{
    let btn=document.createElement("button");
    btn.innerText=opt;
    btn.onclick=()=>check(btn,i);
    options.appendChild(btn);
  });
}

function type(text, el, speed){
  el.innerHTML="";
  let i=0;
  let t=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },speed);
}

function check(btn,i){
  if(i===questions[current].answer){
    btn.classList.add("correct");

    setTimeout(()=>{
      current++;
      if(current<questions.length){
        loadQuestion();
      }else{
        showTransition();
      }
    },500);
  }else{
    btn.classList.add("wrong");
    setTimeout(()=>btn.classList.remove("wrong"),400);
  }
}

/* =========================
   🎬 转场
========================= */
function showTransition(){
  quiz.classList.add("hidden");
  transition.classList.remove("hidden");

  setTimeout(()=>{
    transition.classList.add("hidden");
    birthday.classList.remove("hidden");
    startTyping();
    reveal();
  },2000);
}

/* =========================
   ✍️ 打字
========================= */
function startTyping(){
  let text="Every moment with you matters.";
  let el=document.getElementById("typing");
  let i=0;

  let t=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },90);
}

/* =========================
   📱 滚动电影感
========================= */
function reveal(){
  const items=document.querySelectorAll(".story");

  function check(){
    items.forEach(el=>{
      if(el.getBoundingClientRect().top < window.innerHeight*0.8){
        el.classList.add("show");
      }
    });
  }

  window.addEventListener("scroll",check);
  check();
}

/* =========================
   💖 粒子爱心
========================= */
document.addEventListener("click",e=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=e.clientX+"px";
  h.style.top=e.clientY+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1200);
});

/* init */
loadQuestion();

</script>

</body>
</html>
